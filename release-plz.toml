# release-plz configuration
# See: https://release-plz.dev/docs/config
[workspace]
pr_draft           = true   # keep release PRs as draft until ready to review
git_release_enable = false  # cargo-dist creates the GitHub release with binary artifacts
publish            = true   # publish to crates.io on release

[changelog]
# Inlined from the former cliff.toml — do not create a separate cliff.toml
protect_breaking_commits = false
tag_pattern              = "v[0-9]*"
conventional_commits     = true
filter_unconventional    = true
split_commits            = false

commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/pact-foundation/pact-broker-cli/issues/${2}))" },
]

commit_parsers = [
  { message = "^feat",                group = "Features" },
  { message = "^fix",                 group = "Bug Fixes" },
  { message = "^doc",                 group = "Documentation" },
  { message = "^perf",                group = "Performance" },
  { message = "^refactor",            group = "Refactor" },
  { message = "^style",               group = "Styling" },
  { message = "^test",                group = "Testing" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore",               group = "Miscellaneous Tasks" },
  { body = ".*security",              group = "Security" },
]

filter_commits = false
date_order     = false
sort_commits   = "oldest"

header = """
# Changelog

All notable changes to this project will be documented in this file.

"""

body = """
{% if version %}\\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\\
    ## [unreleased]
{% endif %}\\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message | upper_first }}\\
    {% endfor %}
{% endfor %}

"""

footer = """
<!-- generated by git-cliff -->
"""
trim = true
