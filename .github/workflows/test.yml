---
name: Test

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RUST_BACKTRACE: '1'
  FORCE_COLOR: '1'
  CARGO_TERM_COLOR: always

jobs:
  complete:
    name: Test completion check
    if: always()
    runs-on: ubuntu-latest
    needs:
      - format
      - lint
      - test
    steps:
      - name: Failed
        run: exit 1
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'skipped') ||
          contains(needs.*.result, 'cancelled')

  format:
    name: Format
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  lint:
    name: Lint
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
        with:
          components: clippy
      - name: Run Clippy
        run: cargo clippy -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.draft == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
      - uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595  # v2.81.11
        with:
          tool: cargo-nextest
      - name: Run tests
        run: cargo nextest run
      - name: Upload Pacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: pacts-${{ matrix.os }}
          path: target/pacts
      - name: Start Pact Broker
        if: runner.os != 'Windows'
        uses: you54f/pact-broker-in-a-box@32b14f7a159719ef997e651d02e393349ed553ab # main
      - name: Run CLI integration test
        if: runner.os != 'Windows'
        run: ./run.sh
        env:
          PACT_BROKER_BASE_URL: http://localhost:9292
          BIN: ./target/debug/pact-broker-cli

  pactflow:
    name: PactFlow
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test]
    runs-on: ubuntu-latest
    env:
      PACTICIPANT: pact-broker-cli
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
      - name: Download Pacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: pacts-ubuntu-latest
          path: target/pacts
      - name: Build CLI
        run: cargo build
      - name: Publish pacts to PactFlow
        run: |
          ./target/debug/pact-broker-cli publish target/pacts \
            --consumer-app-version "${GITHUB_SHA}" \
            --branch "${GITHUB_REF_NAME}"
        env:
          PACT_BROKER_BASE_URL: ${{ vars.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACTFLOW_PACT_OSS_TOKEN }}
      - name: Can I deploy?
        run: |
          ./target/debug/pact-broker-cli can-i-deploy \
            --pacticipant "${PACTICIPANT}" \
            --version "${GITHUB_SHA}" \
            --pacticipant "Pact Broker" \
            --branch master
        env:
          PACT_BROKER_BASE_URL: ${{ vars.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACTFLOW_PACT_OSS_TOKEN }}
